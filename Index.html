<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- === Базовые метатеги === -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- Для IE -->
  <title>Заголовок страницы — уникальный и информативный</title>
  <meta name="description" content="Краткое описание страницы (до 160 символов) для поисковиков">
  <meta name="keywords" content="ключевые, слова, через, запятую">
  <meta name="author" content="Имя автора или компании">
  <meta name="robots" content="index, follow"> <!-- Разрешить индексацию и переход по ссылкам -->

  <!-- === Каноническая ссылка (предотвращает дубли) === -->
  <link rel="canonical" href="https://example.com/current-page">

  <!-- === Favicon === -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- === Open Graph (Facebook, VK, LinkedIn и др.) === -->
  <meta property="og:title" content="Заголовок для соцсетей">
  <meta property="og:description" content="Описание, которое увидит пользователь при публикации ссылки">
  <meta property="og:image" content="https://example.com/images/preview.jpg">
  <meta property="og:url" content="https://example.com/current-page">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Название сайта">

  <!-- === Twitter Cards === -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Заголовок для Twitter">
  <meta name="twitter:description" content="Описание для Twitter">
  <meta name="twitter:image" content="https://example.com/images/twitter-preview.jpg">

  <!-- === Предварительное соединение с внешними серверами (ускоряет загрузку) === -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://analytics.google.com">
  <link rel="dns-prefetch" href="https://www.google-analytics.com">

  <!-- === Предзагрузка критических ресурсов === -->
  <link rel="preload" href="/fonts/main.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/css/critical.css" as="style">
  <link rel="preload" href="/js/important.js" as="script">

  <!-- === Основные стили === -->
  <link rel="stylesheet" href="/css/styles.css">

  <!-- === Альтернативные языковые версии (hreflang) === -->
  <link rel="alternate" hreflang="ru" href="https://example.com/ru">
  <link rel="alternate" hreflang="en" href="https://example.com/en">
  <link rel="alternate" hreflang="x-default" href="https://example.com">

  <!-- === Полифиллы (для поддержки старых браузеров) === -->
  <script src="https://polyfill.io/v3/polyfill.min.js" defer></script>

  <!-- === Дополнительно: верификация для поисковых систем (пример) === -->
  <!-- <meta name="google-site-verification" content="..."> -->
  <!-- <meta name="yandex-verification" content="..."> -->
</head>
<body>
  <!-- Содержимое страницы -->
ss

    <!-- === Основные скрипты (с отложенной загрузкой) === -->
  <script src="/JS/script.js" defer></script>
</body>
</html>
